{% extends "base.html" %}
{% load static %}
{% block title %}新規品質ゲート | PMO Agent{% endblock %}
{% block extra_css %}
  <link rel="stylesheet" href="{% static 'css/app_shell.css' %}">
  <link rel="stylesheet" href="{% static 'css/dashboard.css' %}">
{% endblock %}
{% block body %}
<div class="app-shell">
  {% include "partials/sidebar.html" %}
  <div style="flex:1; display:flex; flex-direction:column; min-width:0;">
    {% include "partials/header.html" %}
    <main class="app-main">
      <h1 class="page-title">新規品質ゲート</h1>
      <div class="card panel" style="max-width: 480px;">
        <form method="post">
          {% csrf_token %}
          <div class="form-group"><label class="form-label">ゲート名</label><input type="text" name="name" class="form-input" placeholder="例: システムテスト終了判定" required></div>
          <div class="form-group"><label class="form-label">最低消化率(%)</label><input type="number" step="0.1" name="min_execution_rate" class="form-input"></div>
          <div class="form-group"><label class="form-label">最低合格率(%)</label><input type="number" step="0.1" name="min_pass_rate" class="form-input"></div>
          <div class="form-group"><label class="form-label">最大未クローズ欠陥数</label><input type="number" name="max_open_defects" class="form-input"></div>
          <div class="form-group"><label class="form-label">最大高リスク残数</label><input type="number" name="max_high_risks" class="form-input"></div>
          <button type="submit" class="btn btn-primary btn-block">作成する</button>
        </form>
      </div>
    </main>
  </div>
</div>
{% endblock %}

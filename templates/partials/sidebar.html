<aside class="sidebar">
  <div class="sidebar-brand">
    <span class="mark">✓</span>
    PMO Agent.
  </div>

  <div class="sidebar-project">
    <span class="name">{{ engagement.name }}</span>
    <a href="{% url 'engagements:select' %}">案件を切替</a>
  </div>

  <nav class="sidebar-nav">
    <a href="{% url 'dashboard:home' %}" class="nav-item{% if nav_active == 'home' %} active{% endif %}">
      &#127968; ホーム
    </a>
    <a href="{% url 'tickets:list' %}" class="nav-item{% if nav_active == 'tickets' %} active{% endif %}">
      &#128203; チケット一覧
      {% if total_tickets %}<span class="badge-count">{{ total_tickets }}</span>{% endif %}
    </a>
    <a href="#" class="nav-item">&#128197; カレンダー</a>
    <a href="#" class="nav-item">&#128101; メンバー</a>
    <a href="{% url 'accounts:profile' %}" class="nav-item{% if nav_active == 'settings' %} active{% endif %}">&#9881; 設定</a>
  </nav>

  <div class="sidebar-footer">
    <form method="post" action="{% url 'accounts:logout' %}">
      {% csrf_token %}
      <button type="submit" class="sidebar-logout">&#8592; ログアウト</button>
    </form>
  </div>
</aside>

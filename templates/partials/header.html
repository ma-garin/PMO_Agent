<header class="app-header">
  {% if request.session.current_engagement_name %}
  <div class="app-header-project">
    <span class="proj-label">案件</span>
    <span class="proj-name" title="{{ request.session.current_engagement_name }}">{{ request.session.current_engagement_name }}</span>
    <a href="{% url 'engagements:select' %}" class="proj-switch">切替</a>
  </div>
  {% endif %}
  <div style="flex:1;"></div>
  <div class="app-header-actions">
    <a href="{% url 'pmo_agent:home' %}" class="icon-btn" title="PMO Agentへ" style="width:auto;padding:0 12px;">&#129517; PMO Agent</a>
    <button type="button" class="icon-btn" data-theme-toggle title="テーマ切替">&#9788;</button>
    <details class="user-dropdown">
      <summary class="avatar" title="{{ user.get_full_name|default:user.username }}">
        {{ user.username|slice:":2"|upper }}
      </summary>
      <div class="user-panel">
        <div class="user-panel-head">
          <strong>{{ user.get_full_name|default:user.username }}</strong>
          <span>{{ user.email|default:"" }}</span>
        </div>
        <a href="{% url 'accounts:profile' %}" class="user-menu-item">&#9881; ユーザー設定</a>
        <a href="{% url 'engagements:select' %}" class="user-menu-item">&#128257; 案件を切替</a>
        <form method="post" action="{% url 'accounts:logout' %}">
          {% csrf_token %}
          <button type="submit" class="user-menu-item logout">&#8594; ログアウト</button>
        </form>
      </div>
    </details>
  </div>
</header>

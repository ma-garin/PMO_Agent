{% load static %}{% firstof user.preference.theme "auto" as saved_theme %}<!doctype html>
<html lang="ja"{% if user.is_authenticated and saved_theme != "auto" %} data-theme="{{ saved_theme }}"{% endif %}>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}PMO Agent{% endblock %}</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%231976D2'/><path d='M9 16.5l4.5 4.5L23 11' fill='none' stroke='white' stroke-width='3.2' stroke-linecap='round' stroke-linejoin='round'/></svg>">
  <link rel="stylesheet" href="{% static 'css/base.css' %}">
  {% block extra_css %}{% endblock %}
  <script src="{% static 'js/theme.js' %}" defer></script>
</head>
<body>
  {% block body %}{% endblock %}
</body>
</html>

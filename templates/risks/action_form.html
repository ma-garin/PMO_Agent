{% extends "base.html" %}
{% load static %}
{% block title %}新規改善アクション | PMO Agent{% endblock %}
{% block extra_css %}
  <link rel="stylesheet" href="{% static 'css/app_shell.css' %}">
  <link rel="stylesheet" href="{% static 'css/dashboard.css' %}">
{% endblock %}
{% block body %}
<div class="app-shell">
  {% include "partials/sidebar.html" %}
  <div style="flex:1; display:flex; flex-direction:column; min-width:0;">
    {% include "partials/header.html" %}
    <main class="app-main">
      <h1 class="page-title">新規改善アクション</h1>
      <div class="card panel" style="max-width: 560px;">
        <form method="post">
          {% csrf_token %}
          <div class="form-group">
            <label class="form-label">アクション</label>
            <input type="text" name="title" class="form-input" required>
          </div>
          <div class="form-group">
            <label class="form-label">背景・根拠</label>
            <textarea name="background" class="form-input" rows="3"></textarea>
          </div>
          <div class="form-group">
            <label class="form-label">起点（自由記述）</label>
            <input type="text" name="origin_note" class="form-input" placeholder="例: ODC分析で結合テスト起因が突出">
          </div>
          <div class="form-group">
            <label class="form-label">期限</label>
            <input type="date" name="due_date" class="form-input">
          </div>
          <button type="submit" class="btn btn-primary btn-block">登録する</button>
        </form>
      </div>
    </main>
  </div>
</div>
{% endblock %}
